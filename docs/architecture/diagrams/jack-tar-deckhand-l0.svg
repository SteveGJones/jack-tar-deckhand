<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <title>Jack-Tar — Enterprise Architecture (Level 0)</title>
  <desc>AI-First Business Service Architecture. Enterprise</desc>
<defs>
  <linearGradient id="aiGrad" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" style="stop-color:#7C3AED;stop-opacity:1" />
    <stop offset="100%" style="stop-color:#6B21A8;stop-opacity:1" />
  </linearGradient>
  <filter id="aiGlow" x="-15%" y="-15%" width="130%" height="140%">
    <feGaussianBlur in="SourceAlpha" stdDeviation="5"/>
    <feOffset dx="0" dy="3" result="offsetblur"/>
    <feComponentTransfer>
      <feFuncA type="linear" slope="0.2"/>
    </feComponentTransfer>
    <feMerge>
      <feMergeNode/>
      <feMergeNode in="SourceGraphic"/>
    </feMerge>
  </filter>
  <filter id="shadow" x="-5%" y="-5%" width="115%" height="120%">
    <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
    <feOffset dx="1" dy="2" result="offsetblur"/>
    <feComponentTransfer>
      <feFuncA type="linear" slope="0.12"/>
    </feComponentTransfer>
    <feMerge>
      <feMergeNode/>
      <feMergeNode in="SourceGraphic"/>
    </feMerge>
  </filter>
  <marker id="arr-capability_invocation" viewBox="0 0 10 10" refX="10" refY="5"
      markerWidth="8" markerHeight="8" orient="auto-start-reverse">
    <path d="M 0 0 L 10 5 L 0 10 Z" fill="#2C5282"/>
  </marker>
  <marker id="arr-data_flow" viewBox="0 0 10 10" refX="10" refY="5"
      markerWidth="8" markerHeight="8" orient="auto-start-reverse">
    <path d="M 0 1 L 10 5 L 0 9" fill="none" stroke="#059669" stroke-width="1.5"/>
  </marker>
  <marker id="arr-escalation" viewBox="0 0 10 10" refX="10" refY="5"
      markerWidth="9" markerHeight="9" orient="auto-start-reverse">
    <path d="M 0 0 L 10 5 L 0 10 Z" fill="#DC2626"/>
  </marker>
  <marker id="arr-external" viewBox="0 0 10 10" refX="10" refY="5"
      markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M 0 0 L 10 5 L 0 10 Z" fill="#94A3B8"/>
  </marker>
  <marker id="arr-approval" viewBox="0 0 10 10" refX="10" refY="5"
      markerWidth="8" markerHeight="8" orient="auto-start-reverse">
    <path d="M 0 0 L 10 5 L 0 10 Z" fill="#2C5282"/>
  </marker>
</defs>
  <rect width="800" height="500" fill="#FAFBFC"/>
  <text x="60" y="78" font-family="Inter, 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif" font-size="20" font-weight="700" fill="#1A202C">Jack-Tar — Enterprise Architecture (Level 0)</text>
  <text x="60" y="96" font-family="Inter, 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif" font-size="11" font-weight="500" fill="#64748B" letter-spacing="0.3">Enterprise</text>
  <!-- Interactions -->
  <!-- Services -->
<g class="service" data-id="presentation-engineering" filter="url(#shadow)">
  <rect x="59.998999999999995" y="124.99900000000002" width="195" height="95" rx="8" fill="#F8F9FA" stroke="#2C5282" stroke-width="2"/>
  <rect x="59.998999999999995" y="124.99900000000002" width="195" height="30" rx="8" fill="#4A90E2"/>
  <rect x="59.998999999999995" y="146.99900000000002" width="195" height="8" fill="#4A90E2"/>
  <text x="157.499" y="140.99900000000002" text-anchor="middle" dominant-baseline="central" font-family="Inter, 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif" font-size="13" font-weight="600" fill="#FFFFFF">Presentation Engineering</text>
  <text x="67.999" y="168.99900000000002" font-family="Inter, 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif" font-size="10" fill="#475569">Transform ideas into</text>
  <text x="67.999" y="182.99900000000002" font-family="Inter, 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif" font-size="10" fill="#475569">conference-quality visual</text>
  <text x="67.999" y="196.99900000000002" font-family="Inter, 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif" font-size="10" fill="#475569">presentations by orchestrating</text>
</g>
  <!-- Human Actors -->
<g class="human-actor" data-id="actor-speaker">
  <circle cx="345.18" cy="175.8" r="7.0" fill="none" stroke="#92400E" stroke-width="2.6"/>
<line x1="345.18" y1="182.9" x2="345.18" y2="197.8" stroke="#92400E" stroke-width="2.6" stroke-linecap="round"/>
<line x1="332.9" y1="191.3" x2="357.5" y2="191.3" stroke="#92400E" stroke-width="2.6" stroke-linecap="round"/>
<line x1="345.18" y1="197.8" x2="335.5" y2="211.0" stroke="#92400E" stroke-width="2.6" stroke-linecap="round"/>
<line x1="345.18" y1="197.8" x2="354.9" y2="211.0" stroke="#92400E" stroke-width="2.6" stroke-linecap="round"/>
  <text x="345.18" y="228.54000000000002" text-anchor="middle" font-family="Inter, 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif" font-size="11" font-weight="500" fill="#1A202C">Speaker</text>
</g>
  <!-- System Actors -->
  <!-- External Services -->
<g class="legend" transform="translate(430,350)">
  <rect x="0" y="0" width="340" height="130" rx="8" fill="white" stroke="#E5E7EB" stroke-width="1"/>
  <text x="12" y="18" font-family="Inter, 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif" font-size="11" font-weight="700" fill="#1A202C">Legend</text>
  <rect x="12" y="36" width="16" height="11" rx="3" fill="#F8F9FA" stroke="#2C5282" stroke-width="1.5"/>
  <text x="34" y="45" font-family="Inter, 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif" font-size="9" fill="#475569">Business Service</text>
  <circle cx="20" cy="57" r="3" fill="none" stroke="#92400E" stroke-width="1"/>
  <line x1="20" y1="60" x2="20" y2="66" stroke="#92400E" stroke-width="1"/>
  <text x="34" y="63" font-family="Inter, 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif" font-size="9" fill="#475569">Human Actor</text>
  <rect x="14" y="72" width="12" height="10" rx="1.5" fill="none" stroke="#0C4A6E" stroke-width="1"/>
  <text x="34" y="81" font-family="Inter, 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif" font-size="9" fill="#475569">System</text>
  <rect x="12" y="90" width="16" height="11" rx="3" fill="white" stroke="#94A3B8" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="34" y="99" font-family="Inter, 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif" font-size="9" fill="#475569">External Service</text>
  <line x1="165" y1="41" x2="187" y2="41" stroke="#2C5282" stroke-width="2"/>
  <path d="M 183 38 L 187 41 L 183 44" fill="none" stroke="#2C5282" stroke-width="1.2"/>
  <text x="193" y="45" font-family="Inter, 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif" font-size="9" fill="#475569">Invocation</text>
  <line x1="165" y1="59" x2="187" y2="59" stroke="#059669" stroke-width="2"/>
  <path d="M 183 56 L 187 59 L 183 62" fill="none" stroke="#059669" stroke-width="1.2"/>
  <text x="193" y="63" font-family="Inter, 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif" font-size="9" fill="#475569">Data Flow</text>
  <line x1="165" y1="77" x2="187" y2="77" stroke="#DC2626" stroke-width="2" stroke-dasharray="5,3"/>
  <path d="M 183 74 L 187 77 L 183 80" fill="none" stroke="#DC2626" stroke-width="1.2"/>
  <text x="193" y="81" font-family="Inter, 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif" font-size="9" fill="#475569">Escalation</text>
  <line x1="165" y1="95" x2="187" y2="95" stroke="#15803D" stroke-width="2" stroke-dasharray="2,3"/>
  <path d="M 183 92 L 187 95 L 183 98" fill="none" stroke="#15803D" stroke-width="1.2"/>
  <text x="193" y="99" font-family="Inter, 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif" font-size="9" fill="#475569">Support</text>
  <line x1="165" y1="113" x2="187" y2="113" stroke="#94A3B8" stroke-width="2" stroke-dasharray="4,3"/>
  <path d="M 183 110 L 187 113 L 183 116" fill="none" stroke="#94A3B8" stroke-width="1.2"/>
  <text x="193" y="117" font-family="Inter, 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif" font-size="9" fill="#475569">External</text>
</g>
</svg>