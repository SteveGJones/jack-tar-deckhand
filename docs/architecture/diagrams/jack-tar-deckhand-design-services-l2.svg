<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 641" width="800" height="641">
  <title>Design Services — Level 2 Services</title>
  <desc>AI-First Business Service Architecture. Enterprise &gt; Presentation Engineering &gt; Design Services &gt; Level 2</desc>
<defs>
  <linearGradient id="aiGrad" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" style="stop-color:#7C3AED;stop-opacity:1" />
    <stop offset="100%" style="stop-color:#6B21A8;stop-opacity:1" />
  </linearGradient>
  <filter id="aiGlow" x="-15%" y="-15%" width="130%" height="140%">
    <feGaussianBlur in="SourceAlpha" stdDeviation="5"/>
    <feOffset dx="0" dy="3" result="offsetblur"/>
    <feComponentTransfer>
      <feFuncA type="linear" slope="0.2"/>
    </feComponentTransfer>
    <feMerge>
      <feMergeNode/>
      <feMergeNode in="SourceGraphic"/>
    </feMerge>
  </filter>
  <filter id="shadow" x="-5%" y="-5%" width="115%" height="120%">
    <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
    <feOffset dx="1" dy="2" result="offsetblur"/>
    <feComponentTransfer>
      <feFuncA type="linear" slope="0.12"/>
    </feComponentTransfer>
    <feMerge>
      <feMergeNode/>
      <feMergeNode in="SourceGraphic"/>
    </feMerge>
  </filter>
  <marker id="arr-capability_invocation" viewBox="0 0 10 10" refX="10" refY="5"
      markerWidth="8" markerHeight="8" orient="auto-start-reverse">
    <path d="M 0 0 L 10 5 L 0 10 Z" fill="#2C5282"/>
  </marker>
  <marker id="arr-data_flow" viewBox="0 0 10 10" refX="10" refY="5"
      markerWidth="8" markerHeight="8" orient="auto-start-reverse">
    <path d="M 0 1 L 10 5 L 0 9" fill="none" stroke="#059669" stroke-width="1.5"/>
  </marker>
  <marker id="arr-escalation" viewBox="0 0 10 10" refX="10" refY="5"
      markerWidth="9" markerHeight="9" orient="auto-start-reverse">
    <path d="M 0 0 L 10 5 L 0 10 Z" fill="#DC2626"/>
  </marker>
  <marker id="arr-external" viewBox="0 0 10 10" refX="10" refY="5"
      markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M 0 0 L 10 5 L 0 10 Z" fill="#94A3B8"/>
  </marker>
  <marker id="arr-approval" viewBox="0 0 10 10" refX="10" refY="5"
      markerWidth="8" markerHeight="8" orient="auto-start-reverse">
    <path d="M 0 0 L 10 5 L 0 10 Z" fill="#2C5282"/>
  </marker>
</defs>
  <rect width="800" height="641" fill="#FAFBFC"/>
