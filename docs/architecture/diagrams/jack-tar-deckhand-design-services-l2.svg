<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 720" width="880" height="720">
  <title>Design Services — Level 2 Services</title>
  <desc>AI-First Business Service Architecture. Enterprise &gt; Presentation Engineering &gt; Design Services &gt; Level 2</desc>
<defs>
  <linearGradient id="aiGrad" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" style="stop-color:#7C3AED;stop-opacity:1" />
    <stop offset="100%" style="stop-color:#6B21A8;stop-opacity:1" />
  </linearGradient>
  <filter id="aiGlow" x="-15%" y="-15%" width="130%" height="140%">
    <feGaussianBlur in="SourceAlpha" stdDeviation="5"/>
    <feOffset dx="0" dy="3" result="offsetblur"/>
    <feComponentTransfer>
      <feFuncA type="linear" slope="0.2"/>
    </feComponentTransfer>
    <feMerge>
      <feMergeNode/>
      <feMergeNode in="SourceGraphic"/>
    </feMerge>
  </filter>
  <filter id="shadow" x="-5%" y="-5%" width="115%" height="120%">
    <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
    <feOffset dx="1" dy="2" result="offsetblur"/>
    <feComponentTransfer>
      <feFuncA type="linear" slope="0.12"/>
    </feComponentTransfer>
    <feMerge>
      <feMergeNode/>
      <feMergeNode in="SourceGraphic"/>
    </feMerge>
  </filter>
  <marker id="arr-capability_invocation" viewBox="0 0 10 10" refX="10" refY="5"
      markerWidth="8" markerHeight="8" orient="auto-start-reverse">
    <path d="M 0 0 L 10 5 L 0 10 Z" fill="#2C5282"/>
  </marker>
  <marker id="arr-data_flow" viewBox="0 0 10 10" refX="10" refY="5"
      markerWidth="8" markerHeight="8" orient="auto-start-reverse">
    <path d="M 0 1 L 10 5 L 0 9" fill="none" stroke="#059669" stroke-width="1.5"/>
  </marker>
  <marker id="arr-escalation" viewBox="0 0 10 10" refX="10" refY="5"
      markerWidth="9" markerHeight="9" orient="auto-start-reverse">
    <path d="M 0 0 L 10 5 L 0 10 Z" fill="#DC2626"/>
  </marker>
  <marker id="arr-external" viewBox="0 0 10 10" refX="10" refY="5"
      markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M 0 0 L 10 5 L 0 10 Z" fill="#94A3B8"/>
  </marker>
  <marker id="arr-approval" viewBox="0 0 10 10" refX="10" refY="5"
      markerWidth="8" markerHeight="8" orient="auto-start-reverse">
    <path d="M 0 0 L 10 5 L 0 10 Z" fill="#2C5282"/>
  </marker>
</defs>
  <rect width="880" height="720" fill="#FAFBFC"/>
  <text x="60" y="78" font-family="Inter, 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif" font-size="20" font-weight="700" fill="#1A202C">Design Services — Level 2 Services</text>
  <text x="60" y="96" font-family="Inter, 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif" font-size="11" font-weight="500" fill="#64748B" letter-spacing="0.3">Enterprise &gt; Presentation Engineering &gt; Design Services &gt; Level 2</text>

  <!-- Data flow: TalkBrief + brand assets -> brand-manager -->
  <g class="interaction" data-id="int-input-to-brand-manager">
    <path d="M 162,195 L 162,235" fill="none" stroke="#059669" stroke-width="1.8" marker-end="url(#arr-data_flow)"/>
    <text x="170" y="218" font-family="Inter, 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif" font-size="9" fill="#059669" font-style="italic">TalkBrief + brand assets</text>
  </g>

  <!-- Data flow: brand-manager -> BrandProfile -> slide-stylist -->
  <g class="interaction" data-id="int-brand-manager-to-stylist">
    <path d="M 262,290 L 445,290" fill="none" stroke="#059669" stroke-width="1.8" marker-end="url(#arr-data_flow)"/>
    <text x="310" y="282" font-family="Inter, 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif" font-size="9" fill="#059669" font-style="italic">BrandProfile</text>
  </g>

  <!-- Data flow: slide-stylist -> StyleGuide output -->
  <g class="interaction" data-id="int-stylist-to-output">
    <path d="M 645,290 L 810,290" fill="none" stroke="#059669" stroke-width="1.8" marker-end="url(#arr-data_flow)"/>
    <text x="680" y="282" font-family="Inter, 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif" font-size="9" fill="#059669" font-style="italic">StyleGuide</text>
  </g>

  <!-- Invocation: slide-stylist -> Layout Intelligence (capability) -->
  <g class="interaction" data-id="int-stylist-to-layout">
    <path d="M 545,355 L 545,415" fill="none" stroke="#2C5282" stroke-width="1.8" marker-end="url(#arr-capability_invocation)"/>
  </g>

  <!-- Input label box -->
  <g class="input-label">
    <rect x="60" y="148" width="205" height="44" rx="6" fill="white" stroke="#94A3B8" stroke-width="1" stroke-dasharray="4,3"/>
    <text x="162" y="166" text-anchor="middle" font-family="Inter, 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif" font-size="10" font-weight="600" fill="#475569">Inputs: TalkBrief, brand assets</text>
    <text x="162" y="180" text-anchor="middle" font-family="Inter, 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif" font-size="9" fill="#94A3B8">(logo, PDF, .pptx, hex/font)</text>
  </g>

  <!-- Output label box -->
  <g class="output-label">
    <rect x="740" y="268" width="120" height="44" rx="6" fill="white" stroke="#94A3B8" stroke-width="1" stroke-dasharray="4,3"/>
    <text x="800" y="286" text-anchor="middle" font-family="Inter, 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif" font-size="10" font-weight="600" fill="#475569">Output: StyleGuide</text>
    <text x="800" y="300" text-anchor="middle" font-family="Inter, 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif" font-size="9" fill="#94A3B8">(palette, fonts, layout)</text>
  </g>

  <!-- Services -->

  <!-- Brand Profile Management [skill: brand-manager] -->
<g class="service" data-id="design-brand-profile-management" filter="url(#shadow)">
  <rect x="60" y="245" width="195" height="95" rx="8" fill="#F8F9FA" stroke="#2C5282" stroke-width="2"/>
  <rect x="60" y="245" width="195" height="30" rx="8" fill="#4A90E2"/>
  <rect x="60" y="267" width="195" height="8" fill="#4A90E2"/>
  <text x="157.5" y="261" text-anchor="middle" dominant-baseline="central" font-family="Inter, 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif" font-size="12" font-weight="600" fill="#FFFFFF">Brand Profile Management</text>
  <text x="68" y="289" font-family="Inter, 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif" font-size="10" fill="#475569">Create, store, and serve reusable</text>
  <text x="68" y="303" font-family="Inter, 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif" font-size="10" fill="#475569">BrandProfile artefacts from brand</text>
  <text x="68" y="317" font-family="Inter, 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif" font-size="10" fill="#475569">guidelines, templates, and logos</text>
  <rect x="68" y="326" width="90" height="10" rx="3" fill="#EBF8FF"/>
  <text x="72" y="334" font-family="Inter, 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif" font-size="8" font-weight="600" fill="#2C5282">skill: brand-manager</text>
</g>

  <!-- Style Derivation [skill: slide-stylist] -->
<g class="service" data-id="design-style-derivation" filter="url(#shadow)">
  <rect x="450" y="245" width="195" height="95" rx="8" fill="#F8F9FA" stroke="#2C5282" stroke-width="2"/>
  <rect x="450" y="245" width="195" height="30" rx="8" fill="#4A90E2"/>
  <rect x="450" y="267" width="195" height="8" fill="#4A90E2"/>
  <text x="547.5" y="261" text-anchor="middle" dominant-baseline="central" font-family="Inter, 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif" font-size="13" font-weight="600" fill="#FFFFFF">Style Derivation</text>
  <text x="458" y="289" font-family="Inter, 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif" font-size="10" fill="#475569">Derive a complete StyleGuide</text>
  <text x="458" y="303" font-family="Inter, 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif" font-size="10" fill="#475569">(palette, fonts, spacing,</text>
  <text x="458" y="317" font-family="Inter, 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif" font-size="10" fill="#475569">layout templates) from a talk</text>
  <rect x="458" y="326" width="88" height="10" rx="3" fill="#EBF8FF"/>
  <text x="462" y="334" font-family="Inter, 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif" font-size="8" font-weight="600" fill="#2C5282">skill: slide-stylist</text>
</g>

  <!-- Layout Intelligence [capability: slide-stylist] -->
<g class="service" data-id="design-layout-intelligence" filter="url(#shadow)">
  <rect x="450" y="420" width="195" height="95" rx="8" fill="#F8F9FA" stroke="#2C5282" stroke-width="2"/>
  <rect x="450" y="420" width="195" height="30" rx="8" fill="#4A90E2"/>
  <rect x="450" y="442" width="195" height="8" fill="#4A90E2"/>
  <text x="547.5" y="436" text-anchor="middle" dominant-baseline="central" font-family="Inter, 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif" font-size="13" font-weight="600" fill="#FFFFFF">Layout Intelligence</text>
  <text x="458" y="464" font-family="Inter, 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif" font-size="10" fill="#475569">Apply machine-checkable layout</text>
  <text x="458" y="478" font-family="Inter, 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif" font-size="10" fill="#475569">rules: 12-column grid system,</text>
  <text x="458" y="492" font-family="Inter, 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif" font-size="10" fill="#475569">content zones, safe margins</text>
  <rect x="458" y="500" width="108" height="10" rx="3" fill="#FFF7ED"/>
  <text x="462" y="508" font-family="Inter, 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif" font-size="8" font-weight="600" fill="#92400E">capability: slide-stylist</text>
</g>

  <!-- Human Actors -->
  <!-- System Actors -->
  <!-- External Services -->

  <!-- Legend -->
<g class="legend" transform="translate(500,570)">
  <rect x="0" y="0" width="340" height="130" rx="8" fill="white" stroke="#E5E7EB" stroke-width="1"/>
  <text x="12" y="18" font-family="Inter, 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif" font-size="11" font-weight="700" fill="#1A202C">Legend</text>
  <rect x="12" y="36" width="16" height="11" rx="3" fill="#F8F9FA" stroke="#2C5282" stroke-width="1.5"/>
  <text x="34" y="45" font-family="Inter, 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif" font-size="9" fill="#475569">Business Service</text>
  <circle cx="20" cy="57" r="3" fill="none" stroke="#92400E" stroke-width="1"/>
  <line x1="20" y1="60" x2="20" y2="66" stroke="#92400E" stroke-width="1"/>
  <text x="34" y="63" font-family="Inter, 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif" font-size="9" fill="#475569">Human Actor</text>
  <rect x="14" y="72" width="12" height="10" rx="1.5" fill="none" stroke="#0C4A6E" stroke-width="1"/>
  <text x="34" y="81" font-family="Inter, 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif" font-size="9" fill="#475569">System</text>
  <rect x="12" y="90" width="16" height="11" rx="3" fill="white" stroke="#94A3B8" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="34" y="99" font-family="Inter, 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif" font-size="9" fill="#475569">External Service</text>
  <line x1="165" y1="41" x2="187" y2="41" stroke="#2C5282" stroke-width="2"/>
  <path d="M 183 38 L 187 41 L 183 44" fill="none" stroke="#2C5282" stroke-width="1.2"/>
  <text x="193" y="45" font-family="Inter, 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif" font-size="9" fill="#475569">Invocation</text>
  <line x1="165" y1="59" x2="187" y2="59" stroke="#059669" stroke-width="2"/>
  <path d="M 183 56 L 187 59 L 183 62" fill="none" stroke="#059669" stroke-width="1.2"/>
  <text x="193" y="63" font-family="Inter, 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif" font-size="9" fill="#475569">Data Flow</text>
  <line x1="165" y1="77" x2="187" y2="77" stroke="#DC2626" stroke-width="2" stroke-dasharray="5,3"/>
  <path d="M 183 74 L 187 77 L 183 80" fill="none" stroke="#DC2626" stroke-width="1.2"/>
  <text x="193" y="81" font-family="Inter, 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif" font-size="9" fill="#475569">Escalation</text>
  <line x1="165" y1="95" x2="187" y2="95" stroke="#15803D" stroke-width="2" stroke-dasharray="2,3"/>
  <path d="M 183 92 L 187 95 L 183 98" fill="none" stroke="#15803D" stroke-width="1.2"/>
  <text x="193" y="99" font-family="Inter, 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif" font-size="9" fill="#475569">Support</text>
  <line x1="165" y1="113" x2="187" y2="113" stroke="#94A3B8" stroke-width="2" stroke-dasharray="4,3"/>
  <path d="M 183 110 L 187 113 L 183 116" fill="none" stroke="#94A3B8" stroke-width="1.2"/>
  <text x="193" y="117" font-family="Inter, 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif" font-size="9" fill="#475569">External</text>
</g>
</svg>